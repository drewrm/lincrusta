name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libglib2.0-dev pkg-config libcairo2-dev libpango1.0-dev \
                libgdk-pixbuf-2.0-dev libgraphene-1.0-dev libgtk-4-dev libgtk4-layer-shell0 libgtk4-layer-shell-dev 
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
